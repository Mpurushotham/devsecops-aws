name: Container Build & Push

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/app/**'
      - '.github/workflows/container-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/app/**'

permissions:
  contents: read
  id-token: write
  security-events: write

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

jobs:
  build-and-scan:
    name: Build, Scan & Push
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/dev-cicd-deploy-role
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-ContainerBuild

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ECR_REGISTRY }}/dev/api
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build image (no push yet)
        id: build
        uses: docker/build-push-action@v5
        with:
          context: src/app/
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/dev/api:${{ steps.meta.outputs.version }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: false

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
        if: always()

      - name: Run Grype scan
        uses: anchore/scan-action@v3
        with:
          image: ${{ env.ECR_REGISTRY }}/dev/api:${{ steps.meta.outputs.version }}
          fail-build: true
          severity-cutoff: high

      - name: Verify image with Docker Scout
        run: |
          docker scout cves ${{ env.ECR_REGISTRY }}/dev/api:${{ steps.meta.outputs.version }} \
            --exit-code --only-severity critical
        continue-on-error: true

      - name: Sign image with cosign
        uses: sigstore/cosign-installer@v3
        if: github.ref == 'refs/heads/main'
      - name: Cosign sign
        if: github.ref == 'refs/heads/main'
        run: |
          cosign sign --yes \
            ${{ env.ECR_REGISTRY }}/dev/api@${{ steps.build.outputs.digest }}
        env:
          COSIGN_EXPERIMENTAL: "true"

      - name: Push to ECR
        uses: docker/build-push-action@v5
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
        with:
          context: src/app/
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.ECR_REGISTRY }}/dev/api:${{ steps.meta.outputs.version }}
          format: spdx-json
          output-file: sbom.spdx.json
        if: github.ref == 'refs/heads/main'

      - name: Attach SBOM to image
        if: github.ref == 'refs/heads/main'
        run: |
          cosign attest --yes --predicate sbom.spdx.json \
            --type spdxjson \
            ${{ env.ECR_REGISTRY }}/dev/api@${{ steps.build.outputs.digest }}
        env:
          COSIGN_EXPERIMENTAL: "true"
