apiVersion: v1
kind: Pod
metadata:
  name: compliant-pod-example
  namespace: prod
  annotations:
    seccomp.security.alpha.kubernetes.io/pod: runtime/default
spec:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 3000
    fsGroup: 2000
    seccompProfile:
      type: RuntimeDefault

  automountServiceAccountToken: false

  containers:
    - name: app
      image: ACCOUNT.dkr.ecr.us-east-1.amazonaws.com/prod/api:latest
      imagePullPolicy: Always

      ports:
        - containerPort: 8080

      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop: ["ALL"]
        runAsNonRoot: true
        runAsUser: 1000

      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "500m"
          memory: "512Mi"

      livenessProbe:
        httpGet:
          path: /health
          port: 8080
        initialDelaySeconds: 10
        periodSeconds: 15
        failureThreshold: 3

      readinessProbe:
        httpGet:
          path: /ready
          port: 8080
        initialDelaySeconds: 5
        periodSeconds: 10

      volumeMounts:
        - mountPath: /tmp
          name: tmp-dir
        - mountPath: /var/cache
          name: cache-dir

      env:
        - name: ENVIRONMENT
          value: prod
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: db-password

  volumes:
    - name: tmp-dir
      emptyDir: {}
    - name: cache-dir
      emptyDir: {}
